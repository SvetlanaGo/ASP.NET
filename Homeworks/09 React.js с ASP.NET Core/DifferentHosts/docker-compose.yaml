services:
  weather-server:
    build:
      context: ./Weather.Server
      dockerfile: Dockerfile
    image: weather-server:latest
    container_name: weather-server
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - AllowedHosts=*
    restart: unless-stopped

  weather-client:
    build:
      context: ./weather.client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8081"
    image: weather-client:latest
    container_name: weather-client
    ports:
      - "8091:8090"
    restart: unless-stopped