name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths: [ 'Homeworks/06 Настройка CI/**' ]
  pull_request:
    branches: [ "main" ]
    paths: [ 'Homeworks/06 Настройка CI/**' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  WORK_DIR: Homeworks/06 Настройка CI
  IMAGE_NAME: promocode-factory-ci

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set lowercase image name
      run: |
        LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=${LOWER_OWNER}/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV
        
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build and run tests
      uses: docker/build-push-action@v5
      with:
        context: ${{ env.WORK_DIR }}/src
        file: ${{ env.WORK_DIR }}/src/Dockerfile
        target: test
        push: false
        load: true
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ env.WORK_DIR }}/src
        file: ${{ env.WORK_DIR }}/src/Dockerfile
        target: final
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        cache-from: type=gha